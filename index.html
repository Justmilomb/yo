<script>
const gallery = document.getElementById('gallery');
const statusBar = document.getElementById('status-bar');
const ffmpegStatusDiv = document.getElementById('ffmpeg-status');
const searchInput = document.getElementById('search');
const boardSelect = document.getElementById('board');
const threadLimitSelect = document.getElementById('thread-limit');
const loadBtn = document.getElementById('load-btn');
const stopBtn = document.getElementById('stop-btn');
const progressContainer = document.getElementById('progress-bar-container');
const progressFill = document.getElementById('progress-bar-fill');
const emptyState = document.getElementById('empty-state');
const lightbox = document.getElementById('lightbox');
const lightboxContent = document.getElementById('lightbox-content');

const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

let abortController = null;
let totalMediaCount = 0;

// ── FFmpeg ──────────────────────────────────────────────────────────
let ffmpegReady = false;
let ffmpegLoading = false;
let ffmpegInst = null;

async function ensureFFmpeg() {
    if (ffmpegReady) return ffmpegInst;
    if (ffmpegLoading) {
        while (!ffmpegReady) await new Promise(r => setTimeout(r, 200));
        return ffmpegInst;
    }
    ffmpegLoading = true;
    try {
        const { FFmpeg } = FFmpegWASM;
        const { toBlobURL } = FFmpegUtil;
        ffmpegInst = new FFmpeg();
        const base = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
        await ffmpegInst.load({
            coreURL: await toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript'),
            wasmURL: await toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm'),
        });
        ffmpegReady = true;
        ffmpegStatusDiv.textContent = '✅ FFmpeg ready — WebM→MP4 conversion available';
    } catch (e) {
        ffmpegStatusDiv.textContent = '⚠️ FFmpeg failed — WebM may not play on iOS';
        console.error('FFmpeg load error:', e);
    }
    return ffmpegInst;
}
ensureFFmpeg();

// ── CORS Proxy ─────────────────────────────────────────────────────
const PROXIES = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

// Proxy specifically for media/video blobs - returns an object URL
async function proxyMediaUrl(url, signal) {
    let lastErr;
    for (const mkProxy of PROXIES) {
        try {
            const res = await fetch(mkProxy(url), { signal });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob = await res.blob();
            return URL.createObjectURL(blob);
        } catch (e) {
            if (e.name === 'AbortError') throw e;
            lastErr = e;
        }
    }
    // If all proxies fail, return the raw URL as last resort
    return url;
}

async function fetchJSON(url, signal) {
    let lastErr;
    for (const mkProxy of PROXIES) {
        try {
            const res = await fetch(mkProxy(url), { signal, cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return JSON.parse(await res.text());
        } catch (e) {
            if (e.name === 'AbortError') throw e;
            lastErr = e;
        }
    }
    throw new Error(lastErr?.message || 'All proxies failed');
}

async function fetchBinary(url, signal) {
    let lastErr;
    for (const mkProxy of PROXIES) {
        try {
            const res = await fetch(mkProxy(url), { signal });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return new Uint8Array(await res.arrayBuffer());
        } catch (e) {
            if (e.name === 'AbortError') throw e;
            lastErr = e;
        }
    }
    throw new Error(lastErr?.message || 'Download failed');
}

// ── Status helpers ─────────────────────────────────────────────────
function setStatus(html) { statusBar.innerHTML = html; }
function setProgress(pct) {
    progressContainer.style.display = pct < 0 ? 'none' : 'block';
    progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

// ── Lightbox ───────────────────────────────────────────────────────
function openLightbox(fullUrl, ext) {
    lightboxContent.innerHTML = '';
    const e = ext.toLowerCase();
    if (e === '.webm' || e === '.mp4') {
        const loading = document.createElement('div');
        loading.textContent = 'Loading video…';
        loading.style.cssText = 'color:white;font-family:JetBrains Mono,monospace;font-size:13px;';
        lightboxContent.appendChild(loading);
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';

        proxyMediaUrl(fullUrl).then(blobUrl => {
            lightboxContent.innerHTML = '';
            const v = document.createElement('video');
            v.src = blobUrl; v.controls = true; v.autoplay = true;
            v.loop = true; v.playsInline = true;
            v.style.maxWidth = '95vw'; v.style.maxHeight = '95vh';
            v.onclick = (ev) => ev.stopPropagation();
            lightboxContent.appendChild(v);
            v.play().catch(() => {});
        }).catch(() => {
            lightboxContent.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = '⚠ Could not load video';
            p.style.cssText = 'color:#f55;font-size:13px;';
            lightboxContent.appendChild(p);
        });
        return;
    }
    const img = document.createElement('img');
    img.src = fullUrl;
    lightboxContent.appendChild(img);
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
    if (e && e.target !== lightbox && e.target !== document.getElementById('lightbox-close')) return;
    lightbox.classList.remove('active');
    lightboxContent.innerHTML = '';
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox({ target: lightbox }); });

// ── WebM → MP4 ────────────────────────────────────────────────────
async function convertWebmToMp4(webmUrl, onProgress) {
    const ff = await ensureFFmpeg();
    if (!ff) throw new Error('FFmpeg not available');
    const handler = ({ progress }) => onProgress && onProgress(Math.round(Math.min(progress, 1) * 100));
    ff.on('progress', handler);
    try {
        const data = await fetchBinary(webmUrl);
        await ff.writeFile('in.webm', data);
        await ff.exec(['-i', 'in.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-c:a', 'aac', '-movflags', '+faststart', 'out.mp4']);
        const mp4 = await ff.readFile('out.mp4');
        await ff.deleteFile('in.webm');
        await ff.deleteFile('out.mp4');
        return URL.createObjectURL(new Blob([mp4.buffer], { type: 'video/mp4' }));
    } finally { ff.off('progress', handler); }
}

// ── Format file size ──────────────────────────────────────────────
function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

// ── Gallery item creation ─────────────────────────────────────────
function createGalleryItem(thumbUrl, fullUrl, ext, filesize) {
    const item = document.createElement('div');
    item.className = 'item';
    const e = ext.toLowerCase();

    // Extension badge
    const badge = document.createElement('span');
    badge.className = 'ext-badge';
    badge.textContent = e.replace('.', '');

    // File info overlay
    const info = document.createElement('div');
    info.className = 'file-info';
    info.textContent = fmtSize(filesize);

    // ── GIF — load full URL directly (they play natively) ──
    if (e === '.gif') {
        const img = document.createElement('img');
        img.src = fullUrl; img.loading = 'lazy';
        img.onerror = () => { img.src = 'https://placehold.co/200x200/1c1c22/555?text=Error'; };
        item.appendChild(img);
        item.appendChild(badge);
        item.appendChild(info);
        item.addEventListener('click', () => openLightbox(fullUrl, e));
        return item;
    }

    // ── WebM on Safari/iOS — can't play WebM at all, offer download link ──
    if (e === '.webm' && isSafari) {
        const img = document.createElement('img');
        img.src = thumbUrl; img.loading = 'lazy';
        img.onerror = () => { img.src = 'https://placehold.co/200x200/1c1c22/555?text=No+Thumb'; };
        item.appendChild(img);
        item.appendChild(badge);

        const overlay = document.createElement('div');
        overlay.className = 'convert-btn';
        overlay.innerHTML = '<span class="icon">⬇</span><span>WebM (tap to open)</span><span class="label">Opens in new tab</span>';
        item.appendChild(overlay);

        overlay.addEventListener('click', (ev) => {
            ev.stopPropagation();
            window.open(fullUrl, '_blank');
        });
        return item;
    }

    // ── Video (mp4, webm on non-Safari) — proxy the source for CORS ──
    if (e === '.webm' || e === '.mp4') {
        const img = document.createElement('img');
        img.src = thumbUrl; img.loading = 'lazy';
        img.onerror = () => { img.src = 'https://placehold.co/200x200/1c1c22/555?text=Video'; };
        item.appendChild(img);
        item.appendChild(badge);
        item.appendChild(info);

        // Play icon overlay
        const playIcon = document.createElement('div');
        playIcon.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;';
        playIcon.innerHTML = '<span style="font-size:32px;opacity:0.8;text-shadow:0 2px 8px rgba(0,0,0,0.5);">▶</span>';
        item.appendChild(playIcon);

        let loaded = false;
        item.addEventListener('click', async () => {
            if (loaded) return;
            loaded = true;
            playIcon.innerHTML = '<span style="font-size:14px;opacity:0.9;color:white;font-family:JetBrains Mono,monospace;">Loading…</span>';

            try {
                const blobUrl = await proxyMediaUrl(fullUrl);
                item.innerHTML = '';
                const v = document.createElement('video');
                v.src = blobUrl;
                v.controls = true; v.loop = true; v.muted = true;
                v.playsInline = true; v.autoplay = true;
                v.setAttribute('playsinline', '');
                v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
                v.onerror = () => {
                    item.innerHTML = '';
                    const p = document.createElement('p');
                    p.textContent = '⚠ Playback failed';
                    p.style.cssText = 'color:#f55;padding:8px;font-size:11px;text-align:center;';
                    item.appendChild(p);
                };
                item.appendChild(v);
                item.appendChild(badge);
                v.play().catch(() => {});
            } catch (err) {
                playIcon.innerHTML = '<span style="font-size:11px;color:#f55;">⚠ Failed</span>';
                loaded = false;
            }
        });
        return item;
    }

    // ── Static image — thumbnail, click for full ──
    const img = document.createElement('img');
    img.src = thumbUrl; img.loading = 'lazy';
    img.onerror = () => { img.src = 'https://placehold.co/200x200/1c1c22/555?text=Error'; };
    item.appendChild(img);
    item.appendChild(badge);
    item.appendChild(info);
    item.addEventListener('click', () => openLightbox(fullUrl, e));
    return item;
}

// ── 4chan: Load ALL media from threads ─────────────────────────────
async function loadFrom4chan(board, searchTerm, signal) {
    const limit = parseInt(threadLimitSelect.value);
    setStatus('Fetching 4chan catalog…');

    let data;
    try {
        data = await fetchJSON(`https://a.4cdn.org/${board}/catalog.json`, signal);
    } catch (e) {
        if (e.name === 'AbortError') return;
        setStatus(`<span class="error-text">4chan catalog failed: ${e.message}</span>`);
        return;
    }

    // Flatten all threads from catalog
    let threads = [];
    data.forEach(page => threads = threads.concat(page.threads));

    // Filter by search
    if (searchTerm) {
        const terms = searchTerm.toLowerCase().split(/\s+/);
        threads = threads.filter(t => {
            const txt = ((t.sub || '') + ' ' + (t.com || '') + ' ' + (t.filename || '')).toLowerCase();
            return terms.every(term => txt.includes(term));
        });
    }

    // Sort by reply count (most active first) and limit
    threads.sort((a, b) => (b.replies || 0) - (a.replies || 0));
    threads = threads.slice(0, limit);

    if (threads.length === 0) {
        setStatus(`<span class="warn-text">No matching threads on /${board}/</span>`);
        return;
    }

    setStatus(`Found ${threads.length} threads — fetching all posts…`);
    setProgress(0);

    let threadsDone = 0;
    let errorCount = 0;

    // Fetch each thread to get ALL posts (not just OPs)
    for (const thread of threads) {
        if (signal.aborted) return;

        try {
            const threadData = await fetchJSON(
                `https://a.4cdn.org/${board}/thread/${thread.no}.json`, signal
            );

            const posts = threadData.posts || [];

            for (const post of posts) {
                if (!post.tim || !post.ext) continue; // skip text-only posts

                const thumbUrl = `https://t.4cdn.org/${board}/${post.tim}s.jpg`;
                const fullUrl = `https://i.4cdn.org/${board}/${post.tim}${post.ext}`;

                gallery.appendChild(createGalleryItem(thumbUrl, fullUrl, post.ext, post.fsize));
                totalMediaCount++;
            }
        } catch (e) {
            if (e.name === 'AbortError') return;
            errorCount++;
            console.warn(`Thread ${thread.no} failed:`, e.message);
        }

        threadsDone++;
        const pct = (threadsDone / threads.length) * 100;
        setProgress(pct);
        setStatus(`4chan: <span class="count">${totalMediaCount}</span> media loaded — thread ${threadsDone}/${threads.length}` +
            (errorCount ? ` <span class="warn-text">(${errorCount} errors)</span>` : ''));

        // Small delay between thread fetches to avoid rate-limiting
        if (threadsDone < threads.length) {
            await new Promise(r => setTimeout(r, 300));
        }
    }

    setProgress(-1);
}

// ── Danbooru ──────────────────────────────────────────────────────
async function loadFromDanbooru(searchTerm, signal) {
    let tags = 'rating:general';
    if (searchTerm) tags += '+' + searchTerm.trim().replace(/ /g, '+');

    setStatus(statusBar.innerHTML + ' | Danbooru…');

    try {
        const data = await fetchJSON(
            `https://danbooru.donmai.us/posts.json?tags=${tags}&limit=50`, signal
        );
        let count = 0;
        data.forEach(p => {
            const thumb = p.preview_file_url || p.large_file_url || p.file_url;
            const full = p.file_url || p.large_file_url;
            if (!thumb || !full) return;
            gallery.appendChild(createGalleryItem(thumb, full, '.' + (p.file_ext || 'jpg').toLowerCase(), p.file_size));
            count++;
            totalMediaCount++;
        });
        setStatus(`<span class="count">${totalMediaCount}</span> total media (Danbooru: ${count})`);
    } catch (e) {
        if (e.name === 'AbortError') return;
        setStatus(statusBar.innerHTML + ` | <span class="error-text">Danbooru: ${e.message}</span>`);
    }
}

// ── Main load ─────────────────────────────────────────────────────
async function startLoad() {
    if (abortController) abortController.abort();
    abortController = new AbortController();
    const signal = abortController.signal;

    gallery.innerHTML = '';
    totalMediaCount = 0;
    emptyState.style.display = 'none';
    setStatus('');
    setProgress(-1);

    loadBtn.style.display = 'none';
    stopBtn.style.display = 'inline-block';

    const board = boardSelect.value;
    const search = searchInput.value.trim();

    try {
        await loadFrom4chan(board, search, signal);
        if (!signal.aborted) await loadFromDanbooru(search, signal);
    } catch (e) {
        if (e.name !== 'AbortError') {
            setStatus(`<span class="error-text">${e.message}</span>`);
        }
    }

    loadBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
    setProgress(-1);

    if (totalMediaCount === 0) emptyState.style.display = 'block';
}

function stopLoad() {
    if (abortController) abortController.abort();
    loadBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
    setProgress(-1);
    setStatus(statusBar.innerHTML + ' <span class="warn-text">— Stopped</span>');
}

// Enter key triggers load
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') startLoad(); });

// Auto-load on start
startLoad();
</script>
