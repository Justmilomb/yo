<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #controls {
            padding: 20px;
            text-align: center;
        }
        #search {
            width: 300px;
            padding: 5px;
        }
        #board {
            padding: 5px;
        }
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .item {
            border: 1px solid #ddd;
            background-color: white;
            overflow: hidden;
        }
        .item img, .item video {
            width: 100%;
            height: auto;
            display: block;
        }
        .item a {
            display: block;
        }
        #error {
            color: red;
            padding: 10px 20px;
            white-space: pre-line;
        }
        #status {
            color: #555;
            padding: 5px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Media Gallery from 4chan and Danbooru</h1>
    <p>Enter tags to search (space-separated for multiple), click thumbnails to load full image or play video.</p>
    <div id="controls">
        <label for="search">Search Tags:</label>
        <input id="search" type="text" placeholder="e.g., anime girl">
        &nbsp;
        <label for="board">4chan Board:</label>
        <select id="board">
            <option value="gif">Animated Images</option>
            <option value="hc">Images</option>
            <option value="s">Photos</option>
            <option value="hm">Portraits</option>
            <option value="hr">High Resolution</option>
            <option value="y">Art</option>
        </select>
        &nbsp;
        <button onclick="loadContent()">Load</button>
    </div>
    <div id="status"></div>
    <div id="error"></div>
    <div id="gallery"></div>

<script>
    const gallery = document.getElementById('gallery');
    const errorDiv = document.getElementById('error');
    const statusDiv = document.getElementById('status');
    const searchInput = document.getElementById('search');
    const boardSelect = document.getElementById('board');

    // Multiple proxy fallbacks to try in order
    const PROXIES = [
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];

    function showError(message) {
        errorDiv.textContent += message + '\n';
    }

    function setStatus(message) {
        statusDiv.textContent = message;
    }

    async function fetchWithFallback(url) {
        let lastError;
        for (const makeProxy of PROXIES) {
            const proxyUrl = makeProxy(url);
            try {
                const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                return JSON.parse(text);
            } catch (err) {
                lastError = err;
                // Try next proxy
            }
        }
        throw new Error(lastError?.message || 'All proxies failed');
    }

    // For media URLs, try direct first (often works for images), then proxied
    function getMediaUrl(url) {
        return url; // use direct URL for media; browser will handle it
    }

    async function loadFrom4chan(board, searchTerm) {
        try {
            setStatus('Loading from 4chan…');
            const url = `https://a.4cdn.org/${board}/catalog.json`;
            const data = await fetchWithFallback(url);

            let threads = [];
            data.forEach(page => {
                threads = threads.concat(page.threads);
            });

            if (searchTerm) {
                const terms = searchTerm.toLowerCase().split(' ');
                threads = threads.filter(thread => {
                    const text = ((thread.sub || '') + ' ' + (thread.com || '')).toLowerCase();
                    return terms.every(term => text.includes(term));
                });
            }

            let count = 0;
            threads.forEach(thread => {
                if (thread.tim) {
                    const tim = thread.tim;
                    const ext = thread.ext;
                    const thumb = `https://t.4cdn.org/${board}/${tim}s.jpg`;
                    const full = `https://i.4cdn.org/${board}/${tim}${ext}`;
                    const item = createGalleryItem(thumb, full, ext);
                    gallery.appendChild(item);
                    count++;
                }
            });

            setStatus(`Loaded ${count} items from 4chan.`);
        } catch (error) {
            showError('Error loading from 4chan: ' + error.message);
        }
    }

    async function loadFromDanbooru(searchTerm) {
        let tags = 'rating:general'; // use 'general' to avoid auth requirements
        if (searchTerm) {
            tags += '+' + searchTerm.trim().replace(/ /g, '+');
        }
        try {
            setStatus('Loading from Danbooru…');
            const url = `https://danbooru.donmai.us/posts.json?tags=${tags}&limit=50`;
            const data = await fetchWithFallback(url);

            let count = 0;
            data.forEach(p => {
                // preview_file_url may be absent for some posts; fall back to large_file_url
                const thumb = p.preview_file_url || p.large_file_url || p.file_url;
                const full = p.file_url || p.large_file_url;
                if (!thumb || !full) return;
                const ext = '.' + (p.file_ext || 'jpg').toLowerCase();
                const item = createGalleryItem(thumb, full, ext);
                gallery.appendChild(item);
                count++;
            });

            setStatus(prev => `Loaded ${count} items from Danbooru.`);
        } catch (error) {
            showError('Error loading from Danbooru: ' + error.message);
        }
    }

    // iPhone Safari does not support webm — detect it
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    function createGalleryItem(thumb, full, ext) {
        const item = document.createElement('div');
        item.className = 'item';

        const extLower = ext.toLowerCase();
        const isVideo = extLower.includes('webm') || extLower.includes('mp4');
        const isGif  = extLower.includes('gif');

        // Safari/iPhone cannot play .webm — show a link to open externally instead
        const isWebm = extLower.includes('webm');
        if (isWebm && isSafari) {
            // Show thumbnail with an external-link overlay
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            const img = document.createElement('img');
            img.src = thumb;
            img.loading = 'lazy';
            img.style.width = '100%';
            img.onerror = () => { img.src = 'https://placehold.co/200x200?text=No+Preview'; };
            const badge = document.createElement('a');
            badge.href = full;
            badge.target = '_blank';
            badge.textContent = '▶ Open WebM';
            badge.style.cssText = 'position:absolute;bottom:4px;left:0;right:0;text-align:center;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;padding:4px;text-decoration:none;';
            wrapper.appendChild(img);
            wrapper.appendChild(badge);
            item.appendChild(wrapper);
            return item;
        }

        if (isVideo) {
            // Render video directly — required for iPhone autoplay
            const video = document.createElement('video');
            video.src = full;
            video.controls = true;
            video.autoplay = false;   // don't autoplay all at once — too heavy
            video.loop = true;
            video.muted = true;        // required for any autoplay on iOS
            video.playsInline = true;  // critical: prevents iOS fullscreen takeover
            video.preload = 'none';    // save bandwidth until tapped
            video.style.width = '100%';
            video.setAttribute('playsinline', '');       // belt-and-suspenders for older iOS
            video.setAttribute('webkit-playsinline', '');
            video.onerror = () => {
                video.replaceWith(Object.assign(document.createElement('p'), {
                    textContent: '⚠ Video failed to load',
                    style: 'text-align:center;color:red;padding:8px;'
                }));
            };
            // Tap to play/pause
            video.addEventListener('click', () => {
                video.paused ? video.play() : video.pause();
            });
            item.appendChild(video);

        } else if (isGif) {
            // Animated GIFs work fine as <img> on iOS
            const img = document.createElement('img');
            img.src = full;
            img.loading = 'lazy';
            img.style.width = '100%';
            img.onerror = () => { img.src = 'https://placehold.co/200x200?text=No+Preview'; };
            item.appendChild(img);

        } else {
            // Static image — show thumbnail, tap to swap in full res
            const link = document.createElement('a');
            link.href = full;
            const img = document.createElement('img');
            img.src = thumb;
            img.loading = 'lazy';
            img.onerror = () => { img.src = 'https://placehold.co/200x200?text=No+Preview'; };
            link.appendChild(img);
            link.onclick = (e) => {
                e.preventDefault();
                const full_img = document.createElement('img');
                full_img.src = full;
                full_img.style.width = '100%';
                full_img.onerror = () => { full_img.src = 'https://placehold.co/200x200?text=Load+Error'; };
                item.replaceChild(full_img, link);
            };
            item.appendChild(link);
        }

        return item;
    }

    function loadContent() {
        errorDiv.textContent = '';
        gallery.innerHTML = '';
        statusDiv.textContent = '';
        const searchTerm = searchInput.value.trim();
        const board = boardSelect.value;
        loadFrom4chan(board, searchTerm);
        loadFromDanbooru(searchTerm);
    }

    // Initial load
    loadContent();
</script>
