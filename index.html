<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSFW Gallery</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #controls {
            padding: 20px;
            text-align: center;
        }
        #search {
            width: 300px;
            padding: 5px;
        }
        #board {
            padding: 5px;
        }
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .item {
            border: 1px solid #ddd;
            background-color: white;
            overflow: hidden;
        }
        .item img, .item video {
            width: 100%;
            height: auto;
            display: block;
        }
        .item a {
            display: block;
        }
        #error {
            color: red;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>NSFW Gallery from 4chan and Danbooru</h1>
    <p>Enter tags to search (space-separated for multiple), click thumbnails to load full image or play video.</p>
    <div id="controls">
        <label for="search">Search Tags:</label>
        <input id="search" type="text" placeholder="e.g., anime girl">
        <label for="board">4chan Board:</label>
        <select id="board">
            <option value="gif">/gif/ - Adult GIF</option>
            <option value="hc">/hc/ - Hardcore</option>
            <option value="s">/s/ - Beautiful Women</option>
            <option value="hm">/hm/ - Handsome Men</option>
            <option value="hr">/hr/ - High Resolution</option>
            <option value="y">/y/ - Yaoi</option>
        </select>
        <button onclick="loadContent()">Load</button>
    </div>
    <div id="error"></div>
    <div id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');
        const errorDiv = document.getElementById('error');
        const searchInput = document.getElementById('search');
        const boardSelect = document.getElementById('board');
        const proxyBase = 'https://test.cors.workers.dev/?';

        function showError(message) {
            errorDiv.textContent += message + '\n';
        }

        async function fetchViaProxy(url) {
            const proxyUrl = proxyBase + url;
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy response was not ok: ' + response.status);
                return await response.json();
            } catch (error) {
                throw error;
            }
        }

        function getProxiedUrl(url) {
            return proxyBase + url;
        }

        async function loadFrom4chan(board, searchTerm) {
            try {
                const url = `https://a.4cdn.org/${board}/catalog.json`;
                const data = await fetchViaProxy(url);

                let threads = [];
                data.forEach(page => {
                    threads = threads.concat(page.threads);
                });

                if (searchTerm) {
                    const terms = searchTerm.toLowerCase().split(' ');
                    threads = threads.filter(thread => {
                        const text = ((thread.sub || '') + ' ' + (thread.com || '')).toLowerCase();
                        return terms.every(term => text.includes(term));
                    });
                }

                threads.forEach(thread => {
                    if (thread.tim) {
                        const tim = thread.tim;
                        const ext = thread.ext;
                        const thumb = `https://t.4cdn.org/${board}/${tim}s.jpg`;
                        const full = `https://i.4cdn.org/${board}/${tim}${ext}`;

                        const item = createGalleryItem(getProxiedUrl(thumb), getProxiedUrl(full), ext);
                        gallery.appendChild(item);
                    }
                });
            } catch (error) {
                showError('Error loading from 4chan: ' + error.message);
            }
        }

        async function loadFromDanbooru(searchTerm) {
            let tags = 'rating:explicit';
            if (searchTerm) {
                tags += '+' + searchTerm.replace(/ /g, '+');
            }
            try {
                const url = `https://danbooru.donmai.us/posts.json?tags=${tags}&limit=50`;
                const data = await fetchViaProxy(url);

                data.forEach(p => {
                    if (p.file_url && p.preview_file_url) {
                        const full = p.file_url;
                        const thumb = p.preview_file_url;
                        const ext = p.file_ext.toLowerCase();

                        const item = createGalleryItem(getProxiedUrl(thumb), getProxiedUrl(full), '.' + ext);
                        gallery.appendChild(item);
                    }
                });
            } catch (error) {
                showError('Error loading from Danbooru: ' + error.message);
            }
        }

        function createGalleryItem(thumb, full, ext) {
            const item = document.createElement('div');
            item.className = 'item';

            const link = document.createElement('a');
            link.href = full;
            const img = document.createElement('img');
            img.src = thumb;
            img.onerror = () => { img.src = 'https://via.placeholder.com/200?text=Error'; };
            link.appendChild(img);

            link.onclick = (e) => {
                e.preventDefault();
                let media;
                if (ext.includes('webm') || ext.includes('mp4') || ext.includes('gif')) {
                    media = document.createElement('video');
                    media.src = full;
                    media.controls = true;
                    media.autoplay = true;
                    media.loop = true;
                    media.onerror = () => { console.error('Error loading video'); };
                } else {
                    media = document.createElement('img');
                    media.src = full;
                    media.onerror = () => { console.error('Error loading image'); };
                }
                item.replaceChild(media, link);
            };

            item.appendChild(link);
            return item;
        }

        function loadContent() {
            errorDiv.textContent = '';
            gallery.innerHTML = '';
            const searchTerm = searchInput.value.trim();
            const board = boardSelect.value;
            loadFrom4chan(board, searchTerm);
            loadFromDanbooru(searchTerm);
        }

        // Initial load
        loadContent();
    </script>
</body>
</html>
